<style>
  :root{
    --bg-top:#2b5876; --bg-bot:#4e4376;
    --card:rgba(255,255,255,0.14);
    --text:#fff; --muted:rgba(255,255,255,0.7);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--text);
    background:linear-gradient(165deg,var(--bg-top),var(--bg-bot));

    padding:calc(20px + env(safe-area-inset-top)) 14px calc(60px + env(safe-area-inset-bottom));
  }
  .app{width:100%;max-width:430px;position:relative;z-index:1;}
  #bg{position:fixed;inset:0;z-index:-3;background-size:cover;background-position:center;opacity:0;transition:opacity 1.2s ease, filter 1s ease;}
  #bg.show{opacity:1;}
  #bg-tint{position:fixed;inset:0;z-index:-2;pointer-events:none;transition:background 1s ease;background:linear-gradient(180deg,rgba(0,0,0,.12),rgba(0,0,0,.5));}
  #fx{position:fixed;inset:0;z-index:-1;pointer-events:none;}
  .current{text-shadow:0 1px 10px rgba(0,0,0,.35);}
  .searchbar{display:flex;gap:8px;margin-bottom:18px;}
  .searchbar input{flex:1;border:none;outline:none;border-radius:14px;padding:12px 14px;font-size:15px;background:var(--card);color:var(--text);backdrop-filter:blur(12px);}

  .searchbar button{border:none;border-radius:14px;padding:0 14px;font-size:18px;background:var(--card);color:var(--text);cursor:pointer;backdrop-filter:blur(12px);}
  .toggles{display:flex;gap:8px;margin-bottom:16px;}
  .toggle{border:none;border-radius:14px;padding:8px 12px;font-size:13px;background:var(--card);color:var(--muted);cursor:pointer;backdrop-filter:blur(12px);transition:all .2s;}
  .toggle.on{background:rgba(255,216,110,.28);color:var(--text);}
  .current{text-align:center;margin:10px 0 6px;}

  .now-temp{font-size:96px;font-weight:200;line-height:1;margin:4px 0 0;}

  .now-cond{font-size:20px;font-weight:500;margin-top:2px;}
  .now-range{font-size:17px;color:var(--muted);margin-top:4px;}
  .now-extra{font-size:14px;color:var(--muted);margin-top:4px;}
  .confidence{font-size:13px;color:var(--muted);margin-top:8px;}
  .conf-dots{letter-spacing:2px;margin-right:5px;}
  .conf-dots.c4{color:#7ee2a8;}.conf-dots.c3{color:#bfe08f;}.conf-dots.c2{color:#ffd86e;}.conf-dots.c1{color:#ff9a6e;}
  .now-icon{font-size:42px;margin-top:6px;}
  .vibe{margin:14px auto 0;max-width:330px;font-size:14px;line-height:1.4;opacity:.92;}
  .mood{margin:22px 0 6px;background:var(--card);border-radius:20px;padding:16px 18px 18px;backdrop-filter:blur(12px);}
  .mood-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;}
  .mood-title{font-size:13px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);}
  .mood-label{font-size:15px;font-weight:600;}
  input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:6px;background:linear-gradient(90deg,#5b7cb4,#9aa6b8,#ffd86e);outline:none;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;border-radius:50%;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.35);cursor:pointer;}
  input[type=range]::-moz-range-thumb{width:28px;height:28px;border:none;border-radius:50%;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.35);cursor:pointer;}
  .mood-scale{display:flex;justify-content:space-between;margin-top:8px;font-size:11px;color:var(--muted);}
  .card{background:var(--card);border-radius:18px;padding:14px 16px;margin-top:16px;backdrop-filter:blur(12px);}
  .card-title{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);border-bottom:1px solid rgba(255,255,255,.15);padding-bottom:10px;margin-bottom:6px;display:flex;gap:6px;align-items:center;}
  .hourly{display:flex;gap:18px;overflow-x:auto;padding:10px 2px 4px;scrollbar-width:none;}

  .hour{display:flex;flex-direction:column;align-items:center;gap:7px;min-width:48px;}
  .hour .h-time{font-size:14px;color:var(--muted);}
  .hour .h-ico{font-size:24px;}
  .hour .h-temp{font-size:18px;font-weight:600;}

  .day{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.08);}
  .day:last-child{border-bottom:none;}

  .day .d-ico{width:34px;font-size:22px;text-align:center;}
  .day .d-pop{width:42px;font-size:12px;color:#8fd2ff;text-align:center;}
  .day .d-bar{flex:1;height:5px;border-radius:5px;background:rgba(255,255,255,.18);position:relative;margin:0 8px;}
  .day .d-bar i{position:absolute;height:100%;border-radius:5px;background:linear-gradient(90deg,#7ec8ff,#ffd86e,#ff9a5b);}
  .day .d-lo{width:30px;text-align:right;color:var(--muted);font-size:15px;}
  .day .d-hi{width:30px;text-align:left;font-size:15px;font-weight:600;}
  .sources{font-size:12px;color:var(--muted);text-align:center;margin-top:18px;line-height:1.5;}
  .sources b{color:var(--text);font-weight:600;}
  .src-mode{display:inline-block;margin-top:6px;padding:2px 8px;border-radius:8px;font-size:11px;background:rgba(255,255,255,.12);}
  .loading,.error{text-align:center;padding:40px 0;color:var(--muted);}
  .error{color:#ffb4b4;}
  .spread-chip{font-size:11px;color:var(--muted);margin-left:auto;font-weight:400;text-transform:none;letter-spacing:0;}
  .raw-card{padding-top:6px;}
  .raw-toggle{background:none;border:none;color:var(--text);font-size:14px;font-weight:600;cursor:pointer;padding:8px 0;width:100%;text-align:left;}
  .raw-controls{font-size:13px;color:var(--muted);margin:4px 0 8px;}
  .raw-controls select{background:rgba(255,255,255,.18);color:var(--text);border:none;border-radius:8px;padding:4px 8px;font-size:13px;}
  .raw-controls select option{color:#000;}
  .raw-note{font-size:11px;color:var(--muted);line-height:1.4;margin-bottom:10px;}
  .raw-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .raw-tbl{width:100%;min-width:480px;border-collapse:collapse;font-size:12px;}
  .raw-tbl th,.raw-tbl td{padding:5px 4px;text-align:right;}
  .raw-tbl th:first-child,.raw-tbl td.mname,.raw-tbl .frow td:first-child{text-align:left;}
  .raw-tbl th{color:var(--muted);font-weight:500;border-bottom:1px solid rgba(255,255,255,.15);}
  .raw-tbl td.mname{color:var(--muted);font-size:11px;}
  .raw-tbl td.excl{text-decoration:line-through;opacity:.45;}
  .raw-tbl .frow td{border-top:1px solid rgba(255,255,255,.15);font-weight:600;}
  .raw-tbl .frow.hi td{color:#ffd86e;}
  span.excl{text-decoration:line-through;opacity:.6;}
  .day{cursor:pointer;}
  .day.open{background:rgba(255,255,255,.06);border-radius:10px;}
  .d-chev{width:14px;text-align:center;color:var(--muted);font-size:14px;}
  .day-detail{padding:4px 4px 14px;}
  .detail-stats{display:flex;justify-content:space-between;gap:6px;margin:10px 0 6px;}
  .detail-stats>div{flex:1;text-align:center;}
  .detail-stats .v{font-size:18px;font-weight:600;}
  .detail-stats .l{font-size:10px;color:var(--muted);margin-top:2px;}
  .detail-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin:14px 0 2px;}
  .chart{width:100%;height:auto;display:block;}
  .chart .clab{fill:#fff;font-size:11px;font-weight:600;text-anchor:middle;}
  .axis{display:flex;margin-top:4px;padding:0 12px;}
  .axis span{flex:1;text-align:center;font-size:10px;color:var(--muted);}
  .acc{margin-top:8px;}
  .acc-item{border-top:1px solid rgba(255,255,255,.1);}
  .acc-item:first-child{border-top:none;}

  .acc-head .chev{color:var(--muted);font-size:13px;}

</style>

<body>
<div id="bg"></div>
<div id="bg-tint"></div>
<canvas id="fx"></canvas>
<div class="app">
  <div class="searchbar">
    <input id="q" type="text" placeholder="Ort suchen…" autocomplete="off">
    <button id="goSearch" title="Suchen">🔍</button>
    <button id="goGeo" title="Mein Standort">📍</button>
  </div>
  <div class="toggles">
    <button id="tgBg" class="toggle on">🖼 Hintergrund</button>
    <button id="tgMusic" class="toggle">🎵 Musik</button>
  </div>
  <div id="content"><div class="loading">Wetterdaten werden geladen…</div></div>
  <div class="mood">
    <div class="mood-head">
      <span class="mood-title">Stimmung der Vorhersage</span>
      <span class="mood-label" id="moodLabel">Neutral</span>
    </div>
    <input type="range" id="slider" min="-100" max="100" value="0" step="5">
    <div class="mood-scale"><span>😟 Pessimistisch</span><span>Neutral</span><span>Optimistisch 😎</span></div>
  </div>
  <div class="sources" id="sources"></div>
</div>

<script>
// ====================== Konfiguration ======================
// Reiner Browser-Modus: keine Abhängigkeiten, einfach index.html öffnen.
// Optional: hier die n8n-Webhook-URL eintragen, um ein zentrales Backend zu nutzen
// (nötig, sobald du Anbieter mit geheimem API-Key einbinden willst).
const BACKEND_URL = "";

const MODELS = ["icon_seamless","gfs_seamless","ecmwf_ifs025","gem_seamless","meteofrance_seamless","jma_seamless","ukmo_seamless","metno_seamless","knmi_seamless","dmi_seamless","bom_access_global","cma_grapes_global","ecmwf_aifs025_single"];
const MODEL_NAMES = {icon_seamless:"DWD ICON",gfs_seamless:"NOAA GFS",ecmwf_ifs025:"ECMWF",gem_seamless:"GEM (CA)",meteofrance_seamless:"Météo-France",jma_seamless:"JMA (JP)",ukmo_seamless:"UK Met Office",metno_seamless:"MET Norway",knmi_seamless:"KNMI (NL)",dmi_seamless:"DMI (DK)",bom_access_global:"BOM (AU)",cma_grapes_global:"CMA (CN)",ecmwf_aifs025_single:"ECMWF AIFS (KI)",metno_direct:"MET Norway (direkt)"};

let STATE = { norm:null, slider:0, mode:"", showRaw:false, rawHour:null, openDay:null, openMetric:"temp", lat:null, lon:null, place:"", bgOn:true, musicOn:false };

// ---- Zustand in URL speichern (teilbar / als Lesezeichen) ----
function updateURL(){
  try{
    const p=new URLSearchParams();
    if(STATE.lat!=null){ p.set("lat",(+STATE.lat).toFixed(4)); p.set("lon",(+STATE.lon).toFixed(4)); }
    if(STATE.place) p.set("place",STATE.place);
    p.set("mood",STATE.slider);
    p.set("bg",STATE.bgOn?1:0);
    p.set("music",STATE.musicOn?1:0);
    history.replaceState(null,"","?"+p.toString());
  }catch(e){ /* z.B. file:// — ignorieren */ }
}

// ====================== Statistik ======================
function trim(arr){const a=arr.filter(v=>v!=null&&!Number.isNaN(v)).sort((x,y)=>x-y);return a.length>=4?a.slice(1,-1):a;}
function percentile(sorted,p){
  if(!sorted||sorted.length===0) return null;
  if(sorted.length===1) return sorted[0];
  const idx=(p/100)*(sorted.length-1);const lo=Math.floor(idx),hi=Math.ceil(idx);
  if(lo===hi) return sorted[lo];
  return sorted[lo]+(sorted[hi]-sorted[lo])*(idx-lo);
}
// arr = Werteliste aller Modelle (Reihenfolge egal). kind: 'temp' optimist=wärmer, 'rain' optimist=trockener.
// Neutral (slider==0): alle Werte, kein Ausreißer entfernt.
// Optimistisch/pessimistisch: nur den UNGÜNSTIGEN Ausreißer entfernen, dann Richtung gutes Ende auswerten.
function pick(arr, slider, kind){
  let vals=(arr||[]).filter(v=>v!=null&&!Number.isNaN(v)).sort((a,b)=>a-b);
  if(vals.length===0) return null;
  const s=slider/100;
  if(s!==0 && vals.length>=4){
    if(kind==='temp') vals = s>0 ? vals.slice(1) : vals.slice(0,-1);   // optimist: kältesten weg / pessimist: wärmsten weg
    else              vals = s>0 ? vals.slice(0,-1) : vals.slice(1);   // optimist: nassesten weg / pessimist: trockensten weg
  }
  let p=(kind==='temp')?50+s*40:50-s*40;
  p=Math.max(0,Math.min(100,p));
  return percentile(vals,p);
}
function spreadOf(sorted){ return (!sorted||sorted.length<2)?0:(sorted[sorted.length-1]-sorted[0]); }

// ====================== Bedingung, Icons, Texte ======================
function condition(pop,mm,cloud,isNight){
  if(mm>=2||pop>=70) return {key:"rain-heavy",txt:"Regen",ico:"🌧️"};
  if(mm>=0.3||pop>=45) return {key:"rain",txt:"Schauer möglich",ico:"🌦️"};
  if(cloud>=75) return {key:"cloudy",txt:"Bewölkt",ico:"☁️"};
  if(cloud>=35) return {key:"partly",txt:"Wolkig",ico:isNight?"☁️":"⛅️"};
  return {key:"clear",txt:isNight?"Klar":"Sonnig",ico:isNight?"🌙":"☀️"};
}
function setBackground(condKey,slider){
  const opt=slider/100;let top,bot;
  if(condKey==="clear"){top="#2f80ed";bot="#56ccf2";}
  else if(condKey==="partly"){top="#4a7fb5";bot="#7ab0d6";}
  else if(condKey==="cloudy"){top="#5a6b7e";bot="#8a99a8";}
  else{top="#3a4a5a";bot="#5b6b7a";}
  if(opt>0.15){top=mix(top,"#ffb347",opt*0.4);bot=mix(bot,"#ffd86e",opt*0.45);}
  if(opt<-0.15){top=mix(top,"#1c2530",-opt*0.5);bot=mix(bot,"#2b3a4a",-opt*0.5);}
  document.body.style.setProperty("--bg-top",top);
  document.body.style.setProperty("--bg-bot",bot);
}
function mix(a,b,t){const pa=hx(a),pb=hx(b);return `rgb(${Math.round(pa[0]+(pb[0]-pa[0])*t)},${Math.round(pa[1]+(pb[1]-pa[1])*t)},${Math.round(pa[2]+(pb[2]-pa[2])*t)})`;}
function hx(c){if(c.startsWith("rgb")){const m=c.match(/\d+/g);return[+m[0],+m[1],+m[2]];}const n=parseInt(c.slice(1),16);return[(n>>16)&255,(n>>8)&255,n&255];}

// ====================== Ortsbild (Wikimedia Commons Geosuche, kein Key) ======================
let bgToken=0;
async function setLocationBg(lat,lon,place){
  const myToken=++bgToken;
  const bg=document.getElementById("bg"); if(!bg) return;
  const name=(place||"").split(",")[0].trim();
  const setImg=(url)=>{
    if(myToken!==bgToken||!url) return;
    const img=new Image();
    img.onload=()=>{ if(myToken!==bgToken) return; bg.style.backgroundImage=`url("${url}")`; bg.classList.add("show"); };
    img.onerror=()=>{ if(myToken===bgToken) tryGeo(); };   // Bild defekt -> Geosuche
    img.src=url;
  };
  // repräsentatives Bild über Ortsname: Wikipedia -> Wikidata-Bild (P18)
  async function wikidata(lang,nm){
    try{
      const pp=await (await fetch(`https://${lang}.wikipedia.org/w/api.php?action=query&prop=pageprops&titles=${encodeURIComponent(nm)}&format=json&origin=*&redirects=1`)).json();
      const page=Object.values((pp.query&&pp.query.pages)||{})[0];
      const qid=page&&page.pageprops&&page.pageprops.wikibase_item; if(!qid) return null;
      const wd=await (await fetch(`https://www.wikidata.org/w/api.php?action=wbgetclaims&entity=${qid}&property=P18&format=json&origin=*`)).json();
      const v=wd.claims&&wd.claims.P18&&wd.claims.P18[0]&&wd.claims.P18[0].mainsnak.datavalue&&wd.claims.P18[0].mainsnak.datavalue.value;
      return v?`https://commons.wikimedia.org/wiki/Special:FilePath/${encodeURIComponent(v.replace(/ /g,"_"))}?width=1280`:null;
    }catch(e){ return null; }
  }
  // Fallback: nächstes Foto per Geosuche um die Koordinaten
  async function tryGeo(){
    try{
      const u=`https://commons.wikimedia.org/w/api.php?action=query&format=json&origin=*&generator=geosearch&ggscoord=${lat}|${lon}&ggsradius=10000&ggslimit=14&ggsnamespace=6&prop=imageinfo&iiprop=url|mime&iiurlwidth=1280`;
      const j=await (await fetch(u)).json();
      const cand=Object.values((j.query&&j.query.pages)||{}).map(p=>p.imageinfo&&p.imageinfo[0]).filter(Boolean)
        .filter(ii=>/jpeg|jpg|png/i.test(ii.mime||"")&&ii.thumburl).map(ii=>ii.thumburl);
      if(myToken!==bgToken) return;
      if(cand.length) setImg(cand[0]); else bg.classList.remove("show");
    }catch(e){}
  }
  let url=null;
  if(name && !/^\d/.test(name)) url=(await wikidata("de",name))||(await wikidata("en",name));
  if(myToken!==bgToken) return;
  if(url) setImg(url); else tryGeo();
}

// ====================== Stimmungs-Filter über dem Bild ======================
function applyMoodVisuals(slider){
  const tint=document.getElementById("bg-tint");
  const bg=document.getElementById("bg");
  if(!STATE.bgOn){ if(tint) tint.style.background="transparent"; return; }
  const o=slider/100;
  if(bg) bg.style.filter=`brightness(${(1+o*0.18).toFixed(2)}) saturate(${Math.max(0.4,1+o*0.4).toFixed(2)}) contrast(${(1-o*0.05).toFixed(2)})`;
  if(tint){
    const mood = o>=0
      ? `linear-gradient(180deg, rgba(255,190,90,${(o*0.22).toFixed(2)}), rgba(255,150,60,${(o*0.10).toFixed(2)}))`
      : `linear-gradient(180deg, rgba(20,30,55,${(-o*0.30).toFixed(2)}), rgba(8,12,26,${(-o*0.40).toFixed(2)}))`;
    tint.style.background = `${mood}, linear-gradient(180deg, rgba(0,0,0,0.12), rgba(0,0,0,0.5))`;
  }
}

// ====================== Wetter-Effekte (Canvas: Regen/Schnee) ======================
let fx={type:"",particles:[],raf:0,intensity:1,_resize:false};
function setFX(condKey, temp, slider){
  const canvas=document.getElementById("fx"); if(!canvas) return;
  let type="";
  if(condKey==="rain"||condKey==="rain-heavy") type=(temp!=null&&temp<=1)?"snow":"rain";
  const pess=slider<0?-slider/100:0;
  fx.intensity=(condKey==="rain-heavy"?1.6:1)*(1+pess*0.5);
  if(type!==fx.type){ fx.type=type; seedFX(canvas); }
}
function seedFX(canvas){
  cancelAnimationFrame(fx.raf);
  const ctx=canvas.getContext("2d");
  const resize=()=>{canvas.width=innerWidth;canvas.height=innerHeight;};
  resize();
  if(!fx._resize){ fx._resize=true; addEventListener("resize",resize); }
  if(!fx.type){ ctx.clearRect(0,0,canvas.width,canvas.height); return; }
  const base=fx.type==="snow"?90:150;
  const count=Math.round(base*fx.intensity);
  fx.particles=[]; for(let i=0;i<count;i++) fx.particles.push(newParticle(canvas));
  loopFX(ctx,canvas);
}
function newParticle(c){
  if(fx.type==="snow") return {x:Math.random()*c.width,y:Math.random()*c.height,r:1+Math.random()*2.5,vy:0.5+Math.random()*1.2,vx:(Math.random()-0.5)*0.6,sw:Math.random()*6.28};
  return {x:Math.random()*c.width,y:Math.random()*c.height,len:8+Math.random()*12,vy:7+Math.random()*6,vx:-1-Math.random()*1.6};
}
function loopFX(ctx,c){
  ctx.clearRect(0,0,c.width,c.height);
  if(fx.type==="rain"){
    ctx.strokeStyle="rgba(180,200,230,0.5)"; ctx.lineWidth=1.1;
    for(const p of fx.particles){ ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x+p.vx,p.y+p.len); ctx.stroke(); p.x+=p.vx; p.y+=p.vy; if(p.y>c.height){p.y=-p.len;p.x=Math.random()*c.width;} }
  } else if(fx.type==="snow"){
    ctx.fillStyle="rgba(255,255,255,0.85)";
    for(const p of fx.particles){ p.sw+=0.02; p.x+=p.vx+Math.sin(p.sw)*0.4; p.y+=p.vy; if(p.y>c.height){p.y=-4;p.x=Math.random()*c.width;} ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,6.3); ctx.fill(); }
  } else { return; }
  fx.raf=requestAnimationFrame(()=>loopFX(ctx,c));
}

// ====================== Generative Stimmungsmusik (Web Audio, lokal) ======================
let audio={ctx:null,master:null,filter:null,timer:null,started:false};
function startMusic(){
  if(audio.started) return;
  const AC=window.AudioContext||window.webkitAudioContext; if(!AC) return;
  audio.ctx=new AC();
  if(audio.ctx.state==="suspended"){ audio.ctx.resume().catch(()=>{}); }
  audio.master=audio.ctx.createGain(); audio.master.gain.value=0; audio.master.connect(audio.ctx.destination);
  audio.master.gain.linearRampToValueAtTime(0.16, audio.ctx.currentTime+2.5);
  audio.filter=audio.ctx.createBiquadFilter(); audio.filter.type="lowpass"; audio.filter.frequency.value=1000; audio.filter.connect(audio.master);
  audio.started=true;
  updateMusic(STATE.slider, "");
  scheduleMusic();
}
function stopMusic(){
  if(!audio.started) return;
  try{ audio.master.gain.cancelScheduledValues(audio.ctx.currentTime); audio.master.gain.linearRampToValueAtTime(0,audio.ctx.currentTime+1); }catch(e){}
  clearTimeout(audio.timer);
  const ctx=audio.ctx; audio.started=false;
  setTimeout(()=>{ try{ctx.close();}catch(e){} },1300);
  audio.ctx=null;
}
function musScale(){
  const major=[0,2,4,7,9,12,14,16], minor=[0,3,5,7,10,12,15];
  return STATE.slider>=0?major:minor;
}
function musFreq(semi){ return 110*Math.pow(2,semi/12); }
function playPad(freq,dur){
  const c=audio.ctx; if(!c||!audio.started) return;
  const o1=c.createOscillator(),o2=c.createOscillator(),g=c.createGain();
  o1.type="sine"; o2.type="triangle"; o1.frequency.value=freq; o2.frequency.value=freq*2;
  g.gain.value=0; o1.connect(g); o2.connect(g); g.connect(audio.filter);
  const t=c.currentTime;
  g.gain.linearRampToValueAtTime(0.22,t+0.9);
  g.gain.linearRampToValueAtTime(0,t+dur);
  o1.start(t); o2.start(t); o1.stop(t+dur+0.1); o2.stop(t+dur+0.1);
}
function scheduleMusic(){
  if(!audio.started) return;
  const sc=musScale();
  const oct=STATE.slider>=20?12:(STATE.slider<=-40?-12:0);
  playPad(musFreq(sc[Math.floor(Math.random()*sc.length)]+oct),3.6);
  if(Math.random()<0.5){ const n=sc[Math.floor(Math.random()*sc.length)]+oct; setTimeout(()=>playPad(musFreq(n),3.2),650); }
  const o=STATE.slider/100;
  const interval=Math.max(1500, 2700 - o*700 + Math.random()*900);
  audio.timer=setTimeout(scheduleMusic, interval);
}
function updateMusic(slider, condKey){
  if(!audio.started||!audio.ctx) return;
  const o=slider/100;
  let cut=700+(o+1)*750;   // optimistisch heller, pessimistisch dunkler
  if(condKey==="rain"||condKey==="rain-heavy"||condKey==="cloudy") cut*=0.7;
  try{ audio.filter.frequency.linearRampToValueAtTime(cut, audio.ctx.currentTime+0.6); }catch(e){}
}
function vibeText(slider,cond,hi,lo){
  const c=cond.txt.toLowerCase();
  if(slider>=60) return `Wird ein super Tag! ${cond.txt}, und die optimistische Lesart der Modelle verspricht angenehme ${Math.round(hi)}°. Genieß es!`;
  if(slider>=20) return `Sieht gut aus: ${cond.txt}. Eher die freundlichere Seite der Vorhersagen.`;
  if(slider>-20) return `Ausgewogene Vorhersage aus allen Modellen — ${c}, Mittelwert ohne Schönfärberei.`;
  if(slider>-60) return `Lieber vorsichtig sein: ${cond.txt}. Wir gewichten die trübere Lesart.`;
  return `Mach dich auf was gefasst. ${cond.txt}, kühle ${Math.round(lo)}° möglich — Schirm und Jacke schaden nie.`;
}
function moodLabel(s){if(s>=60)return"Sehr optimistisch";if(s>=20)return"Optimistisch";if(s>-20)return"Neutral";if(s>-60)return"Pessimistisch";return"Sehr pessimistisch";}
// Vertrauens-Indikator: je kleiner die Temperatur-Spannbreite der Modelle, desto verlässlicher
function confidence(spread){
  let lvl,txt;
  if(spread<2){lvl=4;txt="Sehr verlässlich";}
  else if(spread<4){lvl=3;txt="Verlässlich";}
  else if(spread<7){lvl=2;txt="Eher unsicher";}
  else {lvl=1;txt="Sehr unsicher";}
  return {lvl,txt,dots:"●●●●".slice(0,lvl)+"○○○○".slice(0,4-lvl),cls:"c"+lvl};
}

// Zielformat (norm): { place, models:[], hourly:{time,temp[][],pop[][],precip[][],cloud[][],is_day[]}, daily:{time,tmax[][],tmin[][],pop[][],precip[][]} }

// Backend (n8n) liefert bereits das Zielformat
async function fetchBackend(lat,lon,place){

  const r=await fetch(url,{signal:AbortSignal.timeout(8000)});

// Direkter Open-Meteo-Abruf + lokale Aggregation (Fallback)
// Bias je Modell: mittlere Abweichung der jüngsten Vorhersagen von der ERA5-Reanalyse (Messung)
function computeBiasMap(pastJson, eraJson){
  const map={};
  try{
    const eh=eraJson&&eraJson.hourly; const ph=pastJson&&pastJson.hourly;
    if(!eh||!eh.time||!ph||!ph.time) return map;
    const truth={}; eh.time.forEach((t,i)=>{ if(eh.temperature_2m[i]!=null) truth[t]=eh.temperature_2m[i]; });
    for(const m of MODELS){
      const a=ph["temperature_2m_"+m]; if(!a) continue;
      let s=0,n=0;
      ph.time.forEach((t,i)=>{ const tr=truth[t]; if(tr!=null&&a[i]!=null){ s+=(a[i]-tr); n++; } });
      if(n>=48){ map[m]=Math.max(-5,Math.min(5, s/n)); }   // gekappt auf ±5°
    }
  }catch(e){}
  return map;
}
function applyBiasInPlace(obj, base, map){
  for(const m of MODELS){
    const off=map[m]; if(off==null) continue;
    const a=obj[base+"_"+m]; if(!a) continue;
    for(let i=0;i<a.length;i++){ if(a[i]!=null) a[i]=+(a[i]-off).toFixed(2); }
  }
}
async function fetchDirect(lat,lon,place){
  const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`
    +`&hourly=temperature_2m,apparent_temperature,precipitation,precipitation_probability,cloud_cover,wind_speed_10m,wind_gusts_10m,is_day`
    +`&daily=temperature_2m_max,temperature_2m_min,apparent_temperature_max,apparent_temperature_min,precipitation_sum,precipitation_probability_max,wind_speed_10m_max,wind_gusts_10m_max`
    +`&models=${MODELS.join(",")}&forecast_days=7&timezone=auto`;
  // parallel: Bias-Daten (vergangene Modell-Vorhersagen + ERA5-Reanalyse als Messung)
  const fmt=d=>d.toISOString().slice(0,10);
  const eStart=fmt(new Date(Date.now()-10*864e5)), eEnd=fmt(new Date(Date.now()-1*864e5));
  const pastUrl=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m&models=${MODELS.join(",")}&past_days=10&forecast_days=1&timezone=auto`;
  const eraUrl=`https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=${eStart}&end_date=${eEnd}&hourly=temperature_2m&timezone=auto`;
  const [r, pastJson, eraJson] = await Promise.all([
    fetch(url),
    fetch(pastUrl).then(x=>x.ok?x.json():null).catch(()=>null),
    fetch(eraUrl).then(x=>x.ok?x.json():null).catch(()=>null)
  ]);
  if(!r.ok) throw new Error("Wetterdienst nicht erreichbar");
  const om=await r.json();
  const H=om.hourly,D=om.daily;
  // Bias-Korrektur auf Temperaturfelder anwenden (vor der Aggregation)
  const biasMap=computeBiasMap(pastJson, eraJson);
  const biasApplied=Object.keys(biasMap).length>0;
  if(biasApplied){
    applyBiasInPlace(H,"temperature_2m",biasMap);
    applyBiasInPlace(D,"temperature_2m_max",biasMap);
    applyBiasInPlace(D,"temperature_2m_min",biasMap);
  }
  const gather=(o,b)=>{const n=o.time.length,res=[];for(let i=0;i<n;i++){const v=[];for(const m of MODELS){const a=o[b+"_"+m];if(a&&a[i]!=null)v.push(a[i]);}v.sort((x,y)=>x-y);res.push(v);}return res;};
  const gatherRaw=(o,b)=>{const n=o.time.length,res=[];for(let i=0;i<n;i++){let v=null;for(const m of MODELS){const a=o[b+"_"+m];if(a&&a[i]!=null){v=a[i];break;}}res.push(v);}return res;};
  const used=MODELS.filter(m=>H["temperature_2m_"+m]).map(m=>MODEL_NAMES[m]||m);
  const norm={
    place:place||"Standort",models:used,
    biasApplied,
    raw:{hourly:H,daily:D},
    hourly:{time:H.time,temp:gather(H,"temperature_2m"),feels:gather(H,"apparent_temperature"),pop:gather(H,"precipitation_probability"),precip:gather(H,"precipitation"),cloud:gather(H,"cloud_cover"),wind:gather(H,"wind_speed_10m"),gust:gather(H,"wind_gusts_10m"),is_day:gatherRaw(H,"is_day")},
    daily:{time:D.time,tmax:gather(D,"temperature_2m_max"),tmin:gather(D,"temperature_2m_min"),feelsMax:gather(D,"apparent_temperature_max"),pop:gather(D,"precipitation_probability_max"),precip:gather(D,"precipitation_sum"),windMax:gather(D,"wind_speed_10m_max"),gustMax:gather(D,"wind_gusts_10m_max")}
  };
  await mergeMetno(norm, lat, lon, om.utc_offset_seconds||0);   // optionale Zusatzquelle, kein n8n nötig
  return norm;
}

// MET Norway direkt im Browser dazumischen (kein Key; optional – Fehler werden ignoriert).
// Hinweis: met.no wünscht laut ToS eine eigene User-Agent-Kennung; der Browser kann diese
// nicht setzen. Für hohe Last ist der n8n-Weg (mit Kontakt-E-Mail) sauberer.
async function mergeMetno(norm, lat, lon, off){
  try{
    const r=await fetch(`https://api.met.no/weatherapi/locationforecast/2.0/compact?lat=${lat}&lon=${lon}`,{signal:AbortSignal.timeout(7000)});
    if(!r.ok) return;
    const mj=await r.json();
    const series=(mj.properties&&mj.properties.timeseries)||[];
    const time=norm.hourly.time;
    const idxByTime={}; time.forEach((t,i)=>idxByTime[t]=i);
    const localKey=iso=>{const d=new Date(iso);return new Date(d.getTime()+off*1000).toISOString().slice(0,13)+":00";};
    const aT=new Array(time.length).fill(null),aC=new Array(time.length).fill(null),aW=new Array(time.length).fill(null),aP=new Array(time.length).fill(null);
    const push=(arr,idx,v)=>{ if(arr[idx]&&v!=null){arr[idx].push(v);arr[idx].sort((a,b)=>a-b);} };
    let any=false;
    for(const t of series){
      const idx=idxByTime[localKey(t.time)]; if(idx==null) continue;
      const ins=(t.data&&t.data.instant&&t.data.instant.details)||{};
      if(ins.air_temperature!=null){push(norm.hourly.temp,idx,ins.air_temperature); aT[idx]=ins.air_temperature;}
      if(ins.cloud_area_fraction!=null){push(norm.hourly.cloud,idx,ins.cloud_area_fraction); aC[idx]=ins.cloud_area_fraction;}
      if(ins.wind_speed!=null){const w=Math.round(ins.wind_speed*3.6*10)/10; push(norm.hourly.wind,idx,w); aW[idx]=w;}
      const p=t.data&&t.data.next_1_hours&&t.data.next_1_hours.details&&t.data.next_1_hours.details.precipitation_amount;
      if(p!=null){push(norm.hourly.precip,idx,p); aP[idx]=p;}
      any=true;
    }
    if(any){
      norm.models.push("MET Norway (direkt)");
      norm.raw.hourly["temperature_2m_metno_direct"]=aT;
      norm.raw.hourly["cloud_cover_metno_direct"]=aC;
      norm.raw.hourly["wind_speed_10m_metno_direct"]=aW;
      norm.raw.hourly["precipitation_metno_direct"]=aP;
      norm.raw.hasMetno=true;
    }
  }catch(e){ /* met.no ist optional */ }
}

// ====================== Tagesdetail: Verlaufsdiagramme ======================
// Liniendiagramm mit optionalem Unsicherheits-Band (bandLo/bandHi = Modell-Min/Max je Punkt)
function lineChart(vals, stroke, fillId, unit, bandLo, bandHi){
  const W=320,H=84,pad=16,n=vals.length;
  if(n<2) return "";
  const hasBand = bandLo && bandHi && bandLo.length===n;
  let all=vals.filter(v=>v!=null);
  if(hasBand){ for(let k=0;k<n;k++){ if(bandLo[k]!=null)all.push(bandLo[k]); if(bandHi[k]!=null)all.push(bandHi[k]); } }
  const mn=Math.min(...all), mx=Math.max(...all), span=Math.max(0.5,mx-mn);
  const X=k=>pad+(k/(n-1))*(W-2*pad);
  const Y=v=>pad+(1-(v-mn)/span)*(H-2*pad-10)+5;
  let band="";
  if(hasBand){
    const top=[], bot=[];
    for(let k=0;k<n;k++){ if(bandHi[k]!=null) top.push(`${X(k).toFixed(1)},${Y(bandHi[k]).toFixed(1)}`); }
    for(let k=n-1;k>=0;k--){ if(bandLo[k]!=null) bot.push(`${X(k).toFixed(1)},${Y(bandLo[k]).toFixed(1)}`); }
    if(top.length>1) band=`<polygon points="${top.concat(bot).join(" ")}" fill="${stroke}" fill-opacity="0.16"/>`;
  }
  const pts=vals.map((v,k)=>`${X(k).toFixed(1)},${Y(v).toFixed(1)}`).join(" ");
  let fill="";
  if(fillId && !hasBand){const area=`${X(0).toFixed(1)},${H-pad} ${pts} ${X(n-1).toFixed(1)},${H-pad}`;fill=`<polygon points="${area}" fill="url(#${fillId})"/>`;}
  const lvMax=Math.max(...vals), lvMin=Math.min(...vals);
  const lbl=(i,v,dy)=>`<text x="${X(i).toFixed(1)}" y="${(Y(v)+dy).toFixed(1)}" class="clab">${Math.round(v)}${unit}</text>`;
  return `<svg viewBox="0 0 ${W} ${H}" class="chart">
    <defs><linearGradient id="${fillId||'tg'}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${stroke}" stop-opacity=".45"/><stop offset="1" stop-color="${stroke}" stop-opacity="0"/></linearGradient></defs>
    ${fill}${band}
    <polyline points="${pts}" fill="none" stroke="${stroke}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${lbl(vals.indexOf(lvMax),lvMax,-6)}${lvMax!==lvMin?lbl(vals.indexOf(lvMin),lvMin,14):''}
  </svg>`;
}
// Balkendiagramm mit optionalen Whiskern (lo/hi = Modell-Spannbreite je Balken)
function barChart(vals, color, maxScale, lo, hi){
  const W=320,H=64,pad=10,n=vals.length;
  const hasW = lo && hi && lo.length===n;
  let mx=maxScale||Math.max(1,...vals);
  if(hasW){ const hv=hi.filter(v=>v!=null); if(hv.length){ const hm=Math.max(...hv); if(hm>mx) mx=hm; } }
  const slot=(W-2*pad)/n, bw=slot*0.6;
  let bars="";
  vals.forEach((v,k)=>{
    const h=(v/mx)*(H-2*pad);const x=pad+k*slot+(slot-bw)/2;const y=H-pad-h;
    bars+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(0.5,h).toFixed(1)}" rx="2" fill="${color}" opacity="${v>0.01?0.9:0.2}"/>`;
    if(hasW && lo[k]!=null && hi[k]!=null && hi[k]>lo[k]+0.01){
      const cx=x+bw/2, yLo=H-pad-(lo[k]/mx)*(H-2*pad), yHi=H-pad-(hi[k]/mx)*(H-2*pad);
      bars+=`<line x1="${cx.toFixed(1)}" y1="${yHi.toFixed(1)}" x2="${cx.toFixed(1)}" y2="${yLo.toFixed(1)}" stroke="#fff" stroke-opacity="0.45" stroke-width="1.1"/>`;
      bars+=`<line x1="${(cx-3).toFixed(1)}" y1="${yHi.toFixed(1)}" x2="${(cx+3).toFixed(1)}" y2="${yHi.toFixed(1)}" stroke="#fff" stroke-opacity="0.45" stroke-width="1.1"/>`;
    }
  });
  return `<svg viewBox="0 0 ${W} ${H}" class="chart">${bars}</svg>`;
}
function hourAxis(hours){return `<div class="axis">`+hours.map(h=>`<span>${h%3===0?h:''}</span>`).join("")+`</div>`;}

function buildAccordion(d){
  const defs=[
    {key:"temp",  label:"🌡 Temperaturverlauf",     chart:()=>lineChart(d.temps,"#ffd86e","tgrad","°",d.bT.lo,d.bT.hi)},
    {key:"feels", label:"🌡 Gefühlte Temperatur",   chart:()=>lineChart(d.feels,"#ffb38a","fgrad","°",d.bF.lo,d.bF.hi)},
    {key:"pop",   label:"💧 Regenwahrscheinlichkeit",chart:()=>barChart(d.pops,"#8fd2ff",100,d.bP.lo,d.bP.hi)},
    {key:"precip",label:"🌧 Niederschlagsmenge (mm)",chart:()=>barChart(d.precs,"#5fa8e0",d.mmMax,d.bPr.lo,d.bPr.hi)},
    {key:"wind",  label:"💨 Wind (km/h)",            chart:()=>lineChart(d.winds,"#a8d8b0",null,"",d.bW.lo,d.bW.hi)},
    {key:"cloud", label:"☁️ Bewölkung (%)",          chart:()=>lineChart(d.clouds,"#cfd8e3",null,"%",d.bC.lo,d.bC.hi)}
  ];
  const openM=defs.some(m=>m.key===STATE.openMetric)?STATE.openMetric:"temp";
  return defs.map(m=>{
    const on=m.key===openM;
    return `<div class="acc-item">`+
      `<div class="acc-head${on?' active':''}" onclick="window.setMetric('${m.key}')"><span>${m.label}</span><span class="chev">${on?'▾':'▸'}</span></div>`+
      (on?`<div class="acc-body">${m.chart()}${hourAxis(d.hours)}</div>`:"")+
    `</div>`;
  }).join("");
}

function buildDayDetail(N, d, s){

  idxs.forEach((i,k)=>{const c=condition(pops[k],precs[k],clouds[k],N.hourly.is_day[i]===0);strip+=`<div class="hour"><div class="h-time">${hours[k]}</div><div class="h-ico">${c.ico}</div><div class="h-temp">${Math.round(temps[k])}°</div><div class="h-pop">${pops[k]>=20?Math.round(pops[k])+'%':''}</div></div>`;});
  const mmMax=Math.max(0.5,...precs);
  // Unsicherheits-Band: Modell-Min/Max je Stunde (volle Spannbreite, ungetrimmt)
  const band=key=>({
    lo: idxs.map(i=>{const a=N.hourly[key][i]; return a&&a.length?a[0]:null;}),
    hi: idxs.map(i=>{const a=N.hourly[key][i]; return a&&a.length?a[a.length-1]:null;})
  });
  const bT=band("temp"),bF=band("feels"),bP=band("pop"),bPr=band("precip"),bW=band("wind"),bC=band("cloud");
  return `<div class="day-detail">
    <div class="detail-stats">
      <div><div class="v">${Math.round(hi)}°</div><div class="l">Höchst</div></div>
      <div><div class="v">${Math.round(lo)}°</div><div class="l">Tief</div></div>
      <div><div class="v">${Math.round(feelsMax)}°</div><div class="l">Gefühlt</div></div>
      <div><div class="v">${Math.round(popMax)}%</div><div class="l">Regenrisiko</div></div>
      <div><div class="v">${pSum.toFixed(1)}</div><div class="l">mm gesamt</div></div>
      <div><div class="v">${Math.round(windMax)}</div><div class="l">Wind km/h</div></div>
    </div>
    <div class="hourly">${strip}</div>

}

function buildRawHTML(N, s){
  const toggleBtn=`<button class="raw-toggle" onclick="window.toggleRaw()">${STATE.showRaw?'▾ Quellen ausblenden':'▸ Quellen vergleichen (Rohdaten)'}</button>`;
  if(!STATE.showRaw) return `<div class="card raw-card">${toggleBtn}</div>`;
  if(!N.raw) return `<div class="card raw-card">${toggleBtn}<div class="raw-note">Rohdaten nur im Direktmodus verfügbar.</div></div>`;
  const times=N.raw.hourly.time;
  const now=Date.now();
  let baseIdx=times.findIndex(t=>new Date(t).getTime()>=now-3600000); if(baseIdx<0)baseIdx=0;
  let i=STATE.rawHour; if(i==null||i<0||i>=times.length) i=baseIdx;
  let opts="";
  for(let k=baseIdx;k<Math.min(baseIdx+24,times.length);k++){
    const t=new Date(times[k]);
    const lbl=(k===baseIdx)?"Jetzt":t.toLocaleDateString('de-DE',{weekday:'short'})+" "+t.getHours()+"h";
    opts+=`<option value="${k}" ${k===i?'selected':''}>${lbl}</option>`;
  }
  const metrics=[
    {base:"temperature_2m",label:"Temp",unit:"°",kind:"temp",dec:1},
    {base:"apparent_temperature",label:"Gefühlt",unit:"°",kind:"temp",dec:0},
    {base:"precipitation_probability",label:"Regen%",unit:"%",kind:"rain",dec:0},
    {base:"precipitation",label:"mm",unit:"",kind:"rain",dec:1},
    {base:"cloud_cover",label:"Wolken%",unit:"%",kind:"rain",dec:0},
    {base:"wind_speed_10m",label:"Wind",unit:"",kind:"rain",dec:0}
  ];
  const RM=(N.raw&&N.raw.hasMetno)?MODELS.concat(["metno_direct"]):MODELS;   // met.no als Zusatzquelle mitzeigen
  const pairsAt=(b)=>RM.map(m=>{const a=N.raw.hourly[b+"_"+m];return {name:MODEL_NAMES[m]||m,val:(a&&a[i]!=null)?a[i]:null};});
  // reglerabhängig: neutral = nichts entfernt; sonst nur der ungünstige Ausreißer
  const exSet=(pairs,kind)=>{
    const v=pairs.filter(p=>p.val!=null);
    if(s===0||v.length<4) return new Set();
    const sd=[...v].sort((a,b)=>a.val-b.val);
    const low=sd[0].name, high=sd[sd.length-1].name;
    if(kind==='temp') return new Set([s>0?low:high]);   // optimist: kältesten / pessimist: wärmsten
    return new Set([s>0?high:low]);                       // optimist: nassesten / pessimist: trockensten
  };
  const data=metrics.map(mt=>{const p=pairsAt(mt.base);return {mt,pairs:p,ex:exSet(p,mt.kind)};});
  const head=`<tr><th>Modell</th>${metrics.map(m=>`<th>${m.label}</th>`).join("")}</tr>`;
  let rows="";
  RM.forEach((m,mi)=>{
    const name=MODEL_NAMES[m]||m;
    let cells="";
    data.forEach(d=>{
      const p=d.pairs[mi];
      if(p.val==null){cells+=`<td>–</td>`;return;}
      cells+=`<td class="${d.ex.has(name)?'excl':''}">${(+p.val).toFixed(d.mt.dec)}${d.mt.unit}</td>`;
    });
    rows+=`<tr><td class="mname">${name}</td>${cells}</tr>`;
  });
  const med=data.map(d=>pick(d.pairs.map(p=>p.val).filter(v=>v!=null),0,d.mt.kind));
  const interp=data.map(d=>pick(d.pairs.map(p=>p.val).filter(v=>v!=null),s,d.mt.kind));
  const medRow=`<tr class="frow"><td>Median (neutral)</td>${data.map((d,k)=>`<td>${med[k]==null?"–":med[k].toFixed(d.mt.dec)+d.mt.unit}</td>`).join("")}</tr>`;
  const intRow=`<tr class="frow hi"><td>Angezeigt (Regler ${s>0?'+':''}${s})</td>${data.map((d,k)=>`<td>${interp[k]==null?"–":interp[k].toFixed(d.mt.dec)+d.mt.unit}</td>`).join("")}</tr>`;
  return `<div class="card raw-card">${toggleBtn}
    <div class="raw-controls">Zeitpunkt: <select onchange="window.setRawHour(this.value)">${opts}</select></div>
    <div class="raw-note">Im neutralen Modus zählen alle Werte. Sobald du optimistisch/pessimistisch wählst, wird je Spalte nur der <span class="excl">ungünstige Ausreißer</span> entfernt. Unten: Median (neutral) und der bei deiner Reglerstellung angezeigte Wert.${N.biasApplied?" Temperaturen sind bias-korrigiert (ERA5-Abgleich der letzten Tage).":""}</div>
    <div class="raw-scroll"><table class="raw-tbl"><thead>${head}</thead><tbody>${rows}${medRow}${intRow}</tbody></table></div>
  </div>`;
}

// ====================== Rendering ======================
function render(){
  const N=STATE.norm; if(!N) return;
  const s=STATE.slider, H=N.hourly, D=N.daily, times=H.time;
  const now=Date.now();
  let ci=times.findIndex(t=>new Date(t).getTime()>=now-3600*1000); if(ci<0)ci=0;

  const curTemp=pick(H.temp[ci],s,'temp');
  const curPop =pick(H.pop[ci],s,'rain') ?? 0;
  const curMm  =pick(H.precip[ci],s,'rain') ?? 0;
  const curCloud=pick(H.cloud[ci],s,'rain') ?? 0;
  const curFeels=pick(H.feels[ci],s,'temp');
  const curWind=pick(H.wind[ci],s,'rain') ?? 0;
  const curGust=pick(H.gust[ci],s,'rain') ?? 0;
  const isNight=(H.is_day[ci]===0);
  const cond=condition(curPop,curMm,curCloud,isNight);
  const tempSpread=spreadOf(H.temp[ci]);
  const conf=confidence(tempSpread);
  const hiToday=pick(D.tmax[0],s,'temp');
  const loToday=pick(D.tmin[0],s,'temp');

  setBackground(cond.key,s);
  applyMoodVisuals(s);
  setFX(STATE.bgOn?cond.key:"", curTemp, s);
  if(STATE.musicOn) updateMusic(s, cond.key);
  document.getElementById("moodLabel").textContent=moodLabel(s);

  let hoursHtml="";
  const hStart=Math.max(0,ci-8), hEnd=Math.min(ci+24,times.length);   // einige vergangene Stunden + Zukunft
  for(let i=hStart;i<hEnd;i++){
    const t=new Date(times[i]);
    const temp=pick(H.temp[i],s,'temp');
    const pop=pick(H.pop[i],s,'rain') ?? 0;
    const mm=pick(H.precip[i],s,'rain') ?? 0;
    const cl=pick(H.cloud[i],s,'rain') ?? 0;
    const c=condition(pop,mm,cl,H.is_day[i]===0);
    const label=(i===ci)?"Jetzt":t.getHours()+"";
    const cls=i<ci?"hour past":"hour";
    const idAttr=i===ci?' id="now-hour"':'';
    hoursHtml+=`<div class="${cls}"${idAttr}><div class="h-time">${label}</div><div class="h-ico">${c.ico}</div><div class="h-temp">${Math.round(temp)}°</div><div class="h-pop">${pop>=20?Math.round(pop)+"%":""}</div></div>`;
  }

  let gMin=Infinity,gMax=-Infinity;const dayData=[];
  for(let i=0;i<D.time.length;i++){
    const hi=pick(D.tmax[i],s,'temp');const lo=pick(D.tmin[i],s,'temp');
    const pop=pick(D.pop[i],s,'rain') ?? 0;const mm=pick(D.precip[i],s,'rain') ?? 0;
    const c=condition(pop,mm,pop>=45?80:40,false);
    dayData.push({i,hi,lo,pop,c});if(lo<gMin)gMin=lo;if(hi>gMax)gMax=hi;
  }
  const span=Math.max(1,gMax-gMin);
  const dayNames=["So","Mo","Di","Mi","Do","Fr","Sa"];
  let daysHtml="";
  dayData.forEach((dd,idx)=>{
    const name=idx===0?"Heute":dayNames[new Date(D.time[dd.i]).getDay()];
    const left=((dd.lo-gMin)/span)*100;const width=Math.max(8,((dd.hi-dd.lo)/span)*100);
    const open=idx===STATE.openDay;
    daysHtml+=`<div class="day${open?' open':''}" onclick="window.toggleDay(${idx})"><span class="d-name">${name}</span><span class="d-ico">${dd.c.ico}</span><span class="d-pop">${dd.pop>=20?Math.round(dd.pop)+"%":""}</span><span class="d-lo">${Math.round(dd.lo)}°</span><span class="d-bar"><i style="left:${left}%;width:${width}%"></i></span><span class="d-hi">${Math.round(dd.hi)}°</span><span class="d-chev">${open?'⌄':'›'}</span></div>`;
    if(open) daysHtml+=buildDayDetail(N,dd.i,s);
  });

  const _oldStrip=document.getElementById("hourlyMain");
  const _prevScroll=_oldStrip?_oldStrip.scrollLeft:null;   // Scrollposition über Renders hinweg merken
  document.getElementById("content").innerHTML=`
    <div class="current">
      <div class="place">${N.place}</div>
      <div class="now-icon">${cond.ico}</div>
      <div class="now-temp">${Math.round(curTemp)}<span class="deg">°</span></div>
      <div class="now-cond">${cond.txt}</div>
      <div class="now-range">H:${Math.round(hiToday)}°  T:${Math.round(loToday)}°</div>
      <div class="now-extra">Gefühlt ${Math.round(curFeels)}° · Wind ${Math.round(curWind)} km/h${curGust>=curWind+5?` (Böen ${Math.round(curGust)})`:''}</div>
      <div class="confidence"><span class="conf-dots ${conf.cls}">${conf.dots}</span> Vertrauen: ${conf.txt} · Modelle ±${(tempSpread/2).toFixed(1)}°</div>
      <div class="vibe">${vibeText(s,cond,hiToday,loToday)}</div>
    </div>
    <div class="card">
      <div class="card-title">⏱ Stündlich <span class="spread-chip">Modell-Spanne jetzt: ±${(tempSpread/2).toFixed(1)}°</span></div>
      <div class="hourly" id="hourlyMain">${hoursHtml}</div>
    </div>
    <div class="card"><div class="card-title">📅 7-Tage-Vorhersage</div>${daysHtml}</div>
    ${buildRawHTML(N,s)}`;

  // Stundenstreifen positionieren: "Jetzt" ca. 1/3 vom rechten Rand (sonst gemerkte Position halten)
  const _strip=document.getElementById("hourlyMain");
  if(_strip){
    if(_prevScroll==null){
      const nowEl=document.getElementById("now-hour");
      if(nowEl) _strip.scrollLeft=Math.max(0, nowEl.offsetLeft+nowEl.offsetWidth/2 - _strip.clientWidth*(2/3));
    } else { _strip.scrollLeft=_prevScroll; }
  }

  document.getElementById("sources").innerHTML=
    `Ausgewertete Modelle (<b>${N.models.length}</b>): ${N.models.join(" · ")}<br>`+
    `Reglerabhängige Auswertung${N.biasApplied?" · Temperatur bias-korrigiert (ERA5)":""} · `+
    `<span class="src-mode">${STATE.mode}</span>`;
}

// ====================== Laden ======================
async function load(lat,lon,label){
  STATE.lat=lat; STATE.lon=lon; STATE.place=label;
  if(STATE.bgOn) setLocationBg(lat,lon,label);
  document.getElementById("content").innerHTML=`<div class="loading">Wetterdaten werden geladen…</div>`;
  // 1. Backend versuchen (falls konfiguriert), 2. sonst Direktabruf
  if(BACKEND_URL){
    try{
      STATE.norm=await fetchBackend(lat,lon,label);
      STATE.mode="🔗 n8n-Backend";
      render(); updateURL(); return;
    }catch(e){ console.warn("Backend nicht erreichbar, Direktabruf:",e.message); }
  }
  try{
    STATE.norm=await fetchDirect(lat,lon,label);
    STATE.mode=BACKEND_URL?"⚡ Direktabruf (Backend offline)":"⚡ Direktabruf";
    render(); updateURL();
  }catch(e){
    document.getElementById("content").innerHTML=`<div class="error">Fehler: ${e.message}</div>`;
  }
}

// ====================== Events ======================
document.getElementById("slider").addEventListener("input",e=>{STATE.slider=+e.target.value;if(STATE.norm)render();updateURL();});
document.getElementById("tgBg").addEventListener("click",window.toggleBg);
document.getElementById("tgMusic").addEventListener("click",window.toggleMusic);
document.getElementById("goSearch").addEventListener("click",doSearch);
document.getElementById("q").addEventListener("keydown",e=>{if(e.key==="Enter")doSearch();});
async function doSearch(){
  const q=document.getElementById("q").value.trim();if(!q)return;
  try{
    document.getElementById("content").innerHTML=`<div class="loading">Suche „${q}“…</div>`;
    const g=await geocode(q);load(g.lat,g.lon,g.label);
  }catch(e){document.getElementById("content").innerHTML=`<div class="error">${e.message}</div>`;}
}
document.getElementById("goGeo").addEventListener("click",useGeo);
function useGeo(){
  if(!navigator.geolocation)return;
  document.getElementById("content").innerHTML=`<div class="loading">Standort wird ermittelt…</div>`;
  navigator.geolocation.getCurrentPosition(
    async pos=>{
      const {latitude,longitude}=pos.coords;
      const label=await reverseGeocode(latitude,longitude);
      load(latitude,longitude,label);
    },
    ()=>load(52.52,13.41,"Berlin")
  );
}
// Koordinaten -> Ortsname (schlüssellos, BigDataCloud)
async function reverseGeocode(lat,lon){
  try{
    const r=await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=de`,{signal:AbortSignal.timeout(6000)});
    const j=await r.json();
    const city=j.city||j.locality||j.principalSubdivision;
    const region=(j.principalSubdivision&&j.principalSubdivision!==city)?j.principalSubdivision:"";
    if(city) return region?`${city}, ${region}`:city;
  }catch(_){}
  return `${(+lat).toFixed(2)}, ${(+lon).toFixed(2)}`;   // Fallback: Koordinaten
}
window.toggleRaw=()=>{STATE.showRaw=!STATE.showRaw;render();};
window.setRawHour=(v)=>{STATE.rawHour=+v;render();};
window.toggleDay=(i)=>{STATE.openDay=(STATE.openDay===i)?null:i;render();};
window.setMetric=(k)=>{STATE.openMetric=k;render();};
window.toggleBg=()=>{
  STATE.bgOn=!STATE.bgOn;
  document.getElementById("tgBg").classList.toggle("on",STATE.bgOn);
  const bg=document.getElementById("bg");
  if(STATE.bgOn){ if(STATE.lat!=null) setLocationBg(STATE.lat,STATE.lon,STATE.place); }
  else if(bg){ bg.classList.remove("show"); }
  if(STATE.norm) render();
  updateURL();
};
window.toggleMusic=()=>{
  STATE.musicOn=!STATE.musicOn;
  document.getElementById("tgMusic").classList.toggle("on",STATE.musicOn);
  if(STATE.musicOn){ startMusic(); } else { stopMusic(); }
  updateURL();
};

// Service Worker für Offline-Modus registrieren (nur über HTTPS/localhost aktiv)
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
}

// Start – Zustand aus URL übernehmen (falls geteilt/Lesezeichen)
(function start(){
  const q=new URLSearchParams(location.search);
  const lat=parseFloat(q.get("lat")), lon=parseFloat(q.get("lon"));
  const place=q.get("place")||"";
  const mood=parseInt(q.get("mood"),10);
  if(!isNaN(mood)){ STATE.slider=Math.max(-100,Math.min(100,mood)); document.getElementById("slider").value=STATE.slider; }
  if(q.get("bg")==="0"){ STATE.bgOn=false; document.getElementById("tgBg").classList.remove("on"); }
  if(q.get("music")==="1"){
    STATE.musicOn=true; document.getElementById("tgMusic").classList.add("on");
    const startOnce=()=>{ if(STATE.musicOn) startMusic(); document.removeEventListener("pointerdown",startOnce); };
    document.addEventListener("pointerdown",startOnce);   // Autoplay-Regeln: erst bei erster Berührung
  }
  if(!isNaN(lat)&&!isNaN(lon)){ load(lat,lon, place||`${lat.toFixed(2)}, ${lon.toFixed(2)}`); }
  else { load(52.52,13.41,"Berlin"); }
})();
</script>
